<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

<h2>LeadFlow CRM</h2>

<button onclick="logout()">Logout</button>

</div>


<div class="dashboard">

<div class="card">
<h3>Total Leads</h3>
<h1>120</h1>
</div>

<div class="card">
<h3>New</h3>
<h1>50</h1>
</div>

<div class="card">
<h3>Contacted</h3>
<h1>40</h1>
</div>

<div class="card">
<h3>Converted</h3>
<h1>30</h1>
</div>

</div>


<div class="table-container">

<h2>Lead Management</h2>

<input
id="search"
placeholder="Search Lead..."
onkeyup="searchLead()"
/>

<table id="leadTable">

<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
</tr>

<tr>
<td>John</td>
<td>john@gmail.com</td>
<td>
<select>
<option>New</option>
<option>Contacted</option>
<option>Converted</option>
</select>
</td>
</tr>

<tr>
<td>Alex</td>
<td>alex@gmail.com</td>
<td>
<select>
<option>Contacted</option>
<option>New</option>
<option>Converted</option>
</select>
</td>
</tr>

<tr>
<td>David</td>
<td>david@gmail.com</td>
<td>
<select>
<option>Converted</option>
<option>New</option>
<option>Contacted</option>
</select>
</td>
</tr>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
